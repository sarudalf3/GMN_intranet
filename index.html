<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal IA | GMN Group</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería de Autenticación de Microsoft -->
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- PANTALLA DE LOGIN (Se muestra por defecto) -->
    <div id="login-screen" class="flex flex-col items-center justify-center h-screen">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 text-center max-w-sm">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">GMN Group</h1>
            <p class="text-gray-500 mb-6">Inicia sesión con tu cuenta corporativa para acceder a las herramientas de IA.</p>
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all flex items-center justify-center gap-2">
                <img src="https://docs.microsoft.com/en-us/azure/active-directory/develop/media/howto-add-branding-in-azure-ad-apps/ms-symbollockup_mssymbol_32.png" class="w-5 h-5">
                Iniciar sesión con Microsoft
            </button>
        </div>
    </div>

    <!-- DASHBOARD DE APLICACIONES (Oculto hasta loguearse) -->
    <div id="dashboard" class="hidden">
        <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
            <span class="font-bold text-xl text-blue-800">GMN <span class="text-slate-500">AI HUB</span></span>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-sm text-gray-600"></span>
                <button onclick="handleLogout()" class="text-xs text-red-500 hover:underline">Cerrar sesión</button>
            </div>
        </nav>

        <main class="p-8 max-w-6xl mx-auto">
            <h2 class="text-2xl font-bold text-slate-800 mb-8">Aplicaciones Disponibles</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- App 1: Cartas Gantt -->
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
                    <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center mb-4 text-blue-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <h3 class="font-bold text-lg mb-2 text-slate-800">Gestión Gantt (Claude)</h3>
                    <p class="text-sm text-gray-600 mb-6">Visualización dinámica de proyectos y cronogramas operativos.</p>
                    <a href="http://URL-PUBLICA-DEL-LOCAL.com/gantt" target="_blank" class="block text-center bg-slate-800 hover:bg-slate-900 text-white py-2 rounded-lg text-sm font-semibold transition-colors">
                        Abrir en nueva pestaña
                    </a>
                </div>

                <!-- Espacio para futuras apps -->
                <div class="border-2 border-dashed border-gray-200 rounded-xl flex items-center justify-center p-6 grayscale opacity-50">
                    <p class="text-gray-400 font-medium italic text-sm">Próximamente más herramientas...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURACIÓN DE MICROSOFT (Reemplazar con datos de GoDaddy/Azure)
        const msalConfig = {
            auth: {
                clientId: "d2b137ef-4acc-488b-bf72-3aedcc5ee545", 
                authority: "https://login.microsoftonline.com/c5598f60-6a92-4ebb-8cb7-26d72d709407",                redirectUri: window.location.origin
            }
        };

        const myMSALObj = new msal.PublicClientApplication(msalConfig);

        async function handleLogin() {
            try {
                const loginResponse = await myMSALObj.loginPopup({
                    scopes: ["user.read"]
                });
                // Verificar que sea del dominio correcto
                if (loginResponse.account.username.endsWith("@gmngroup.cl")) {
                    showDashboard(loginResponse.account);
                } else {
                    alert("Acceso restringido solo para @gmngroup.cl");
                    handleLogout();
                }
            } catch (error) { console.error(error); }
        }

        function showDashboard(account) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = account.username;
        }

        function handleLogout() {
            // Lógica simple de limpieza para la maqueta
            location.reload();
        }
    </script>
</body>
</html>
