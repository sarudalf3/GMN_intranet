<!DOCTYPE html>
<html lang="es">
<head>

<body class="bg-slate-50 min-h-screen">

                    <li>📊 <a href="#" class="hover:underline">Presentación SAP (PPTX)</a></li>

            </section>

                    <li>🛡️ <a href="#" class="hover:underline">Código de Higiene</a></li>
                </ul>
            </section>

            <section class="bg-white p-6 rounded-xl shadow-sm border">

                <ul class="text-sm space-y-2">
                    <li>🔗 <a href="proyecto_info.html?id=proyectoA" class="text-purple-700 font-bold hover:underline">Proyecto Aac</a></li>
                    <li>🔗 <a href="proyecto_info.html?id=proyectoB" class="text-purple-700 font-bold hover:underline">Proyecto Bbb</a></li>
                </ul>
            </section>

        <div id="admin-panel" class="hidden mt-8 p-6 bg-slate-800 text-white rounded-xl">
            <h3 class="font-bold">Panel Administrador</h3>
            <button class="mt-2 text-sm bg-blue-600 px-4 py-2 rounded">Subir nuevo archivo</button>

<script>
    // Pequeña validación extra de seguridad en el dashboard
    window.onload = () => {
        const accounts = myMSALObj.getAllAccounts();
        if (accounts.length === 0) {
            window.location.assign("index.html");
        } else {
            console.log("Bienvenido:", accounts[0].username);
            // Aquí puedes rellenar el nombre del usuario en el HTML si quieres
            // document.getElementById('username').innerText = accounts[0].name;
        }
    };
</script>
