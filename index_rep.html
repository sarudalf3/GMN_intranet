<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | GMN Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>

    <script src="js/authConfig.js"></script>
    <script src="js/auth.js"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-2xl shadow-2xl text-center max-w-sm">
        <h1 class="text-2xl font-bold mb-4 text-slate-800">GMN Intranet</h1>
        <p class="text-gray-500 mb-8">Inicia sesión con tu cuenta corporativa.</p>
        <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all flex items-center justify-center gap-2">
            <img src="https://docs.microsoft.com/en-us/azure/active-directory/develop/media/howto-add-branding-in-azure-ad-apps/ms-symbollockup_mssymbol_32.png" 
                alt="Microsoft logo"
                title="Microsoft logo"
                class="w-5 h-5">
            Iniciar sesión
        </button>
    </div>
</body>
</html>
